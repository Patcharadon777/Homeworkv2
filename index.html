<!DOCTYPE html>
<html lang="th">

<head>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
            background: black;
        }

        /* วิดีโอพื้นหลัง */
        video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            filter: brightness(45%);
        }

        /* ====== LOGIN SCREEN STYLES ====== */
        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(5px);
        }

        .login-screen.hidden {
            display: none;
        }

        .login-box {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid hsl(271, 100%, 50%);
            border-radius: 20px;
            padding: 40px 30px;
            max-width: 350px;
            width: 90%;
            box-shadow: 0 8px 32px rgba(82, 0, 189, 0.3);
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            // Try to sync any locally-saved tasks to Firebase (run when DB rules now permit)
            async function syncLocalToFirebase() {
                const store=_getLocalStore();
                const groups=Object.keys(store);
                if ( !groups.length) return;
                console.log('syncLocalToFirebase: found local groups', groups);

                for (const g of groups) {
                    const arr=(store[g] || []).slice();

                    for (const task of arr) {
                        try {
                            await push(ref(db, 'tasks/' + g), {
                                text: task.text,
                                nameAdder: task.nameAdder,
                                deadline: task.deadline,
                                createdAt: task.createdAt || new Date().toISOString(),
                                image: task.image || null
                            });
                        removeLocalTask(g, task.id);
                        console.log('synced local task', task.id, 'to group', g);
                    }

                    catch (err) {
                        console.warn('sync failed for task', task.id, err);
                    }
                }
            }

            alert('🔄 ซิงก์งานจากเครื่องไปยัง Firebase เสร็จสิ้น (ถ้ามี)');
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
        }

<body>

    <script>
        // login logic before any Firebase imports
        const ADMIN_USERNAME = '6/4';
        const ADMIN_PASSWORD = 'ราชาฟีฟาย';
        console.log('admin credentials', ADMIN_USERNAME, ADMIN_PASSWORD);
        let currentUser = null;
        try {
            const stored = localStorage.getItem('currentUser');
            if (stored) currentUser = JSON.parse(stored);
        } catch (e) {
            console.warn('invalid currentUser in storage, clearing', e);
            localStorage.removeItem('currentUser');
            currentUser = null;
        }

        function handleLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');
            errorDiv.textContent = '';
            console.log('login attempt', { username, password });
            if (!username || !password) {
                errorDiv.textContent = '⚠️ กรอกชื่อผู้ใช้และรหัสผ่าน';
                return;
            }
            if (username !== ADMIN_USERNAME || (password !== ADMIN_PASSWORD && password !== 'kingfreefire')) {
                console.log('credentials mismatch', { username, password });
                errorDiv.textContent = '❌ ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง';
                return;
            }
            currentUser = username;
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainScreen').classList.add('active');
            document.getElementById('userProfile').classList.add('active');
            document.getElementById('usernameDisplay').textContent = `👤 ${username}`;
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
            // call tracker initializer if available
            if (window.initializeHomeworkTracker) {
                window.initializeHomeworkTracker();
            }
        }

        function handleLogout() {
            if (confirm('ตรวจสอบว่าต้องการออกจากระบบ?')) {
                currentUser = null;
                localStorage.removeItem('currentUser');
                document.getElementById('loginScreen').classList.remove('hidden');
                document.getElementById('mainScreen').classList.remove('active');
                document.getElementById('userProfile').classList.remove('active');
                document.getElementById('groupName').value = '';
                document.getElementById('taskInput').value = '';
                document.getElementById('nameAdder').value = '';
                document.getElementById('taskList').innerHTML = '';
            }
        }

        window.addEventListener('load', function () {
            const loginBtn = document.getElementById('loginBtn');
            const logoutBtn = document.getElementById('logoutBtn');
            const togglePasswordBtn = document.getElementById('togglePasswordBtn');
            const loginPasswordInput = document.getElementById('loginPassword');
            if (loginBtn) loginBtn.addEventListener('click', handleLogin);
            if (logoutBtn) logoutBtn.addEventListener('click', handleLogout);
            if (togglePasswordBtn && loginPasswordInput) {
                togglePasswordBtn.addEventListener('click', function () {
                    console.log("togglePassword clicked", loginPasswordInput.type, loginPasswordInput.value);
                    const isHidden = loginPasswordInput.type === 'password';
                    loginPasswordInput.type = isHidden ? 'text' : 'password';
                    togglePasswordBtn.textContent = isHidden ? '🙈 ซ่อนรหัสผ่าน' : '👁️ แสดงรหัสผ่าน';
                    // re-focus so content refreshes visibly
                    loginPasswordInput.focus();
                });
            }
            if (currentUser) {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainScreen').classList.add('active');
                document.getElementById('userProfile').classList.add('active');
                document.getElementById('usernameDisplay').textContent = `👤 ${currentUser}`;
                if (window.initializeHomeworkTracker) window.initializeHomeworkTracker();
            }
        });
    </script>

        <div class="container">

    <!-- Firebase modules -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getDatabase, ref, onValue, push, remove } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

        /* 🔥 Firebase Config */
        const firebaseConfig = {
            apiKey: "AIzaSyAXcMead5BPSjbPorQ1jvhVqrK0h7r2Hxg",
            authDomain: "dxnz-f64ac.firebaseapp.com",
            databaseURL: "https://dxnz-f64ac-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "dxnz-f64ac",
            storageBucket: "dxnz-f64ac.firebasestorage.app",
            messagingSenderId: "983256071502",
            appId: "1:983256071502:web:c5356cc2b2111b5263f21f",
            measurementId: "G-V692SPV400"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);


        // ====== HOMEWORK TRACKER ======
        window.initializeHomeworkTracker = function () {
            const groupInput = document.getElementById("groupName");
            const taskInput = document.getElementById("taskInput");
            const nameAdderInput = document.getElementById("nameAdder");
            const deadlineInput = document.getElementById("deadline");
            const imageInput = document.getElementById("taskImage");
            const taskList = document.getElementById("taskList");
            const addBtn = document.getElementById("addBtn");
            const musicBtn = document.getElementById("musicBtn");
            const music = document.getElementById("bgMusic");

            let currentGroup = null;

            // --- Local fallback storage (used when Firebase permissions block access) ---
            function _getLocalStore() {
                try {
                    const raw = localStorage.getItem('localTasks');
                    return raw ? JSON.parse(raw) : {};
                } catch (e) {
                    console.warn('localTasks parse failed', e);
                    localStorage.removeItem('localTasks');
                    return {};
                }
            }

            function _saveLocalStore(obj) {
                try {
                    localStorage.setItem('localTasks', JSON.stringify(obj));
                } catch (e) {
                    console.error('saving localTasks failed', e);
                }
            }

            function saveLocalTask(group, payload) {
                const store = _getLocalStore();
                if (!store[group]) store[group] = [];
                const id = 'local-' + Date.now() + '-' + Math.floor(Math.random() * 10000);
                const item = Object.assign({ id: id }, payload);
                store[group].push(item);
                _saveLocalStore(store);
                return id;
            }

            function removeLocalTask(group, key) {
                const store = _getLocalStore();
                if (!store[group]) return false;
                const before = store[group].length;
                store[group] = store[group].filter(t => t.id !== key);
                _saveLocalStore(store);
                return store[group].length < before;
            }

            function loadLocalTasks(group) {
                const store = _getLocalStore();
                const arr = store[group] || [];
                renderTasksFromArray(arr, group);
            }

            function renderTasksFromArray(arr, group) {
                taskList.innerHTML = '';
                if (!arr || arr.length === 0) {
                    taskList.innerHTML = "<p style='color: rgba(255,255,255,0.5); margin-top: 20px;'>ยังไม่มีงานในกลุ่ม \"" + group + "\"</p>";
                    return;
                }
                arr.forEach(task => {
                    const div = document.createElement('div');
                    div.className = 'task';
                    const deadlineDisplay = task.deadline ? new Date(task.deadline).toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric' }) : 'ไม่มีกำหนด';
                    const nameAdder = task.nameAdder || 'ไม่ระบุ';
                    let imgHtml = '';
                    if (task.image) imgHtml = `<div class="task-image"><img src="${task.image}" alt="ภาพประกอบ"></div>`;
                    div.innerHTML = `
                        <div class="task-content">
                            <div class="task-main"><strong>📝 ${task.text}</strong></div>
                            ${imgHtml}
                            <div class="task-info">
                                <p style="margin: 5px 0; font-size: 13px;">👤 ผู้เพิ่ม: <strong>${nameAdder}</strong></p>
                                <p style="margin: 5px 0; font-size: 13px;">📅 กำหนดส่ง: <strong>${deadlineDisplay}</strong></p>
                            </div>
                        </div>
                        <button class="delete-btn" onclick="deleteTask('${group}','${task.id}')">🗑️ ลบ</button>
                    `;
                    taskList.appendChild(div);
                    if (task.image) {
                        const imgEl = div.querySelector('.task-image img');
                        if (imgEl) {
                            imgEl.style.cursor = 'pointer';
                            imgEl.addEventListener('click', () => {
                                const w = window.open('', '_blank');
                                if (!w) return;
                                w.document.write(`<!DOCTYPE html><html><head><title>รูปงาน</title><meta charset="utf-8"></head><body style="margin:0;display:flex;align-items:center;justify-content:center;background:#000;"><img src="${task.image}" style="max-width:100%;max-height:100vh;"></body></html>`);
                                w.document.close();
                            });
                        }
                    }
                });
            }

            function getFormattedDate(dateString) {
                if (!dateString) return "ไม่มีกำหนด";
                const date = new Date(dateString);
                return date.toLocaleDateString("th-TH", { year: "numeric", month: "short", day: "numeric" });
            }

            function readImageAsDataURL(file) {
                return new Promise((resolve, reject) => {
                    if (!file) return resolve(null);
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = reject;
                    reader.readAsDataURL(file);
                });
            }

            function loadTasks(group) {
                if (!group) {
                    taskList.innerHTML = "";
                    return;
                }
                currentGroup = group;
                const taskRef = ref(db, "tasks/" + group);

                onValue(taskRef, (snapshot) => {
                    taskList.innerHTML = "";
                    if (snapshot.exists()) {
                        snapshot.forEach(child => {
                            const taskData = child.val();
                            const div = document.createElement("div");
                            div.className = "task";
                            const deadlineDisplay = getFormattedDate(taskData.deadline);
                            const nameAdder = taskData.nameAdder || "ไม่ระบุ";

                            let imgHtml = "";
                            if (taskData.image) {
                                imgHtml = `<div class="task-image"><img src="${taskData.image}" alt="ภาพประกอบ"></div>`;
                            }

                            div.innerHTML = `
                                <div class="task-content">
                                    <div class="task-main"><strong>📝 ${taskData.text}</strong></div>
                                    ${imgHtml}
                                    <div class="task-info">
                                        <p style="margin: 5px 0; font-size: 13px;">👤 ผู้เพิ่ม: <strong>${nameAdder}</strong></p>
                                        <p style="margin: 5px 0; font-size: 13px;">📅 กำหนดส่ง: <strong>${deadlineDisplay}</strong></p>
                                    </div>
                                </div>
                                <button class="delete-btn" onclick="deleteTask('${group}','${child.key}')">🗑️ ลบ</button>
                            `;
                            taskList.appendChild(div);

                            if (taskData.image) {
                                const imgEl = div.querySelector('.task-image img');
                                if (imgEl) {
                                    imgEl.style.cursor = 'pointer';
                                    imgEl.addEventListener('click', () => {
                                        const w = window.open('', '_blank');
                                        if (!w) return;
                                        w.document.write(`<!DOCTYPE html><html><head><title>รูปงาน</title><meta charset="utf-8"></head><body style="margin:0;display:flex;align-items:center;justify-content:center;background:#000;"><img src="${taskData.image}" style="max-width:100%;max-height:100vh;"></body></html>`);
                                        w.document.close();
                                    });
                                }
                            }
                        });
                    } else {
                        taskList.innerHTML = "<p style='color: rgba(255,255,255,0.5); margin-top: 20px;'>ยังไม่มีงานในกลุ่ม \"" + group + "\"</p>";
                    }
                }, (error) => {
                    console.error("Error loading tasks:", error);
                    // fallback to local storage when permission denied or other errors
                    loadLocalTasks(group);
                });
            }

            addBtn.addEventListener("click", async () => {
                const group = groupInput.value.trim();
                const text = taskInput.value.trim();
                const nameAdder = nameAdderInput.value.trim();
                const deadline = deadlineInput.value;
                const file = imageInput.files[0];

                if (!group || !text) {
                    alert("⚠️ กรอกชื่อกลุ่มและงาน");
                    return;
                }

                let imageData = null;
                try {
                    imageData = await readImageAsDataURL(file);
                } catch (e) {
                    console.warn("Image read failed", e);
                }

                const payload = {
                    text: text,
                    nameAdder: nameAdder,
                    deadline: deadline,
                    createdAt: new Date().toISOString()
                };
                if (imageData) payload.image = imageData;

                push(ref(db, "tasks/" + group), payload)
                    .then(() => {
                        loadTasks(group);
                        alert("✅ เพิ่มงานเรียบร้อย");
                    })
                    .catch(error => {
                        console.error("Error adding task:", error);
                        // fallback to local store when permission denied
                        try {
                            const localId = saveLocalTask(group, payload);
                            loadLocalTasks(group);
                            alert("⚠️ บันทึกงานไว้ในเครื่อง (offline): " + localId);
                        } catch (e) {
                            console.error('local fallback failed', e);
                            alert("❌ เกิดข้อผิดพลาด");
                        }
                    });

                taskInput.value = "";
                nameAdderInput.value = "";
                deadlineInput.value = "";
                imageInput.value = "";
            });

            taskInput.addEventListener("keypress", (e) => {
                if (e.key === "Enter") {
                    addBtn.click();
                }
            });

            groupInput.addEventListener("change", () => {
                const group = groupInput.value.trim();
                if (group) {
                    loadTasks(group);
                }
            });

            let groupLoadTimeout;
            groupInput.addEventListener("input", () => {
                clearTimeout(groupLoadTimeout);
                const group = groupInput.value.trim();
                if (group && group.length >= 1) {
                    groupLoadTimeout = setTimeout(() => {
                        loadTasks(group);
                    }, 500);
                }
            });

            window.deleteTask = function (group, key) {
                if (confirm("ต้องการลบงานนี้?")) {
                    remove(ref(db, "tasks/" + group + "/" + key)).then(() => {
                        // reload tasks (firebase will update)
                        loadTasks(group);
                    }).catch(error => {
                        console.error("Error deleting task:", error);
                        // try local fallback delete
                        const ok = removeLocalTask(group, key);
                        if (ok) {
                            loadLocalTasks(group);
                            alert('✅ ลบงานจากเครื่องเรียบร้อย');
                        } else {
                            alert("❌ ลบงานไม่สำเร็จ");
                        }
                    });
                }
            };

            musicBtn.addEventListener("click", async () => {
                try {
                    music.volume = 1.0;
                    music.muted = false;

                    if (music.paused) {
                        const playPromise = music.play();
                        if (playPromise !== undefined) {
                            playPromise
                                .then(() => {
                                    musicBtn.innerText = "⏸️ ปิดเพลง";
                                })
                                .catch(error => {
                                    console.warn("Autoplay blocked:", error);
                                    musicBtn.innerText = "🎵 เปิดเพลง";
                                });
                        }
                    } else {
                        music.pause();
                        musicBtn.innerText = "🎵 เปิดเพลง";
                    }
                } catch (error) {
                    console.error("Audio error:", error);
                    musicBtn.innerText = "❌ เพลงไม่ได้";
                    setTimeout(() => {
                        musicBtn.innerText = "🎵 เปิดเพลง";
                    }, 2000);
                }
            });

            music.addEventListener("error", (e) => {
                console.error("Audio playback error:", e);
                musicBtn.innerText = "⚠️ ไฟล์เพลง";
            });

            if (groupInput.value.trim()) {
                loadTasks(groupInput.value.trim());
            }

            // If local tasks exist (from previous offline saves) try to sync them now
            try {
                const local = _getLocalStore();
                if (Object.keys(local).length) {
                    // attempt sync in background
                    syncLocalToFirebase().catch(e => console.warn('background sync error', e));
                }
            } catch (e) {
                console.warn('local store check failed', e);
            }
        };


    </script>

</body>

</html>
